<style>
:root{
  --bg:#ffffff; --card:#ffffff; --ink:#22303c; --muted:#6b7a87; --line:#dde5ec;
  --navy:#123a5e; --title:#123a5e; --brand:#2b8fd0; --brand-dark:#123a5e;
  --ok:#1b9e4b; --ok-bg:#e6f6ec; --low:#d98b00; --low-bg:#fdf3e0;
  --high:#d12f2f; --high-bg:#fdeaea; --na:#8a98a4; --na-bg:#eef2f5;
  --treated:#2f7ec4;
  --s1:8px; --s2:13px; --s3:21px; --s4:34px; --s5:55px;
}
/* dark: --navy stays fixed (header bar & stripes read white-on-navy in both
   themes, as in the live app). Only --title lightens, for figures set on dark cards. */
@media (prefers-color-scheme:dark){
  :root{ --bg:#0e1620; --card:#16212d; --ink:#e7eef4; --muted:#8ea0ae; --line:#243343;
    --na-bg:#1d2935; --na:#8094a3; --ok-bg:#14301f; --low-bg:#32260f; --high-bg:#3a1a1a;
    --title:#cfe4f5; }
}
:root[data-theme="dark"]{ --bg:#0e1620; --card:#16212d; --ink:#e7eef4; --muted:#8ea0ae; --line:#243343;
  --na-bg:#1d2935; --na:#8094a3; --ok-bg:#14301f; --low-bg:#32260f; --high-bg:#3a1a1a;
  --title:#cfe4f5; }
:root[data-theme="light"]{ --bg:#ffffff; --card:#ffffff; --ink:#22303c; --muted:#6b7a87; --line:#dde5ec;
  --navy:#123a5e; --title:#123a5e; --na-bg:#eef2f5; --na:#8a98a4;
  --ok-bg:#e6f6ec; --low-bg:#fdf3e0; --high-bg:#fdeaea; }

*{ box-sizing:border-box; }
body{ margin:0; background:var(--bg); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:16px; line-height:1.4; -webkit-font-smoothing:antialiased; }
.wrap{ max-width:560px; margin:0 auto; padding:0 var(--s2) calc(var(--s5) + env(safe-area-inset-bottom)); }
.tnum{ font-variant-numeric:tabular-nums; }

/* header */
header.top{ position:sticky; top:0; z-index:5; background:var(--navy);
  padding:calc(var(--s2) + env(safe-area-inset-top)) var(--s2) var(--s2);
  margin:0 calc(-1 * var(--s2)) var(--s3); }
header.top h1{ margin:0; font-size:1.35rem; color:#fff; letter-spacing:.2px; }
header.top .sub{ margin:2px 0 0; color:#bcd6ea; font-size:.82rem; }
.beta{ display:inline-block; font-size:.62rem; font-weight:700; letter-spacing:.14em;
  text-transform:uppercase; background:var(--brand); color:#fff; border-radius:4px;
  padding:2px 6px; vertical-align:middle; margin-left:8px; }
.tools{ display:flex; gap:var(--s1); margin-top:var(--s2); }
.tools label,.tools button{ font:inherit; font-size:.78rem; color:#dfeefb; background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.22); border-radius:8px; padding:6px 10px; cursor:pointer; }
.tools input[type=file]{ display:none; }

/* eyebrow section label — mirrors the app's navy section stripe */
.eyebrow{ display:flex; align-items:baseline; gap:8px; margin:var(--s4) 0 var(--s2); }
.eyebrow h2{ margin:0; font-size:.72rem; font-weight:700; letter-spacing:.13em;
  text-transform:uppercase; color:var(--title); }
.eyebrow .hint{ font-size:.72rem; color:var(--muted); }

/* stat tiles */
.tiles{ display:grid; grid-template-columns:repeat(3,1fr); gap:var(--s1); }
.tile{ background:var(--card); border:1px solid var(--line); border-radius:14px;
  padding:var(--s2) var(--s2) var(--s2); text-align:left; }
.tile .n{ font-size:1.9rem; font-weight:700; color:var(--title); line-height:1;
  font-variant-numeric:tabular-nums; }
.tile .u{ font-size:.72rem; color:var(--muted); }
.tile .l{ margin-top:6px; font-size:.72rem; color:var(--ink); font-weight:600; }
.tile .k{ font-size:.66rem; color:var(--muted); }

/* passage bar strip */
.bars{ display:flex; align-items:flex-end; gap:3px; height:88px; margin-top:var(--s2);
  padding:var(--s2) 0 0; border-bottom:1px solid var(--line); }
.bar{ flex:1; min-width:0; display:flex; flex-direction:column; align-items:center; gap:4px; height:100%; justify-content:flex-end; }
.bar i{ width:100%; max-width:16px; background:var(--brand); border-radius:3px 3px 0 0; display:block; }
.bar.today i{ background:var(--title); }
.bar.zero i{ background:var(--line); }
.bar b{ font-size:.62rem; color:var(--title); font-weight:700; font-variant-numeric:tabular-nums; }
.bar.sun i{ background:var(--na-bg); }
.axis{ display:flex; gap:3px; margin-top:4px; }
.axis span{ flex:1; text-align:center; font-size:.6rem; color:var(--muted); min-width:0;
  overflow:hidden; white-space:nowrap; font-weight:600; }
.axis span em{ display:block; font-style:normal; font-weight:500; font-size:.52rem; color:var(--muted); }
.axis span.sun{ color:var(--high); }

/* product totals */
.prod{ display:flex; flex-direction:column; gap:6px; }
.prow{ display:grid; grid-template-columns:1fr auto; align-items:center; gap:10px;
  background:var(--card); border:1px solid var(--line); border-radius:10px; padding:9px var(--s2); }
.prow .pn{ font-weight:600; font-size:.9rem; }
.prow .pk{ font-size:.7rem; color:var(--muted); }
.prow .pq{ font-weight:700; color:var(--title); font-variant-numeric:tabular-nums; }
.prow .pq small{ font-weight:500; color:var(--muted); }
.prow .track{ grid-column:1 / -1; height:5px; border-radius:3px; background:var(--na-bg); overflow:hidden; }
.prow .track i{ display:block; height:100%; background:var(--brand); border-radius:3px; }

/* per-pool rows — pool + last visit + last measure, with FC trend as complement */
.pool{ display:flex; flex-direction:column; gap:5px;
  background:var(--card); border:1px solid var(--line); border-radius:12px;
  padding:10px var(--s2); margin-bottom:6px; }
.pool.stale{ border-color:#f0d9a8; }
.pool .head{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
.pool .id{ font-weight:700; color:var(--title); font-size:.95rem; }
.pool .seen{ font-size:.72rem; color:var(--muted); font-variant-numeric:tabular-nums; white-space:nowrap; }
.pool .seen.warn{ color:var(--low); font-weight:600; }
.pool .spark{ width:120px; height:30px; flex:none; }
.pool .meas{ display:flex; align-items:center; gap:10px; font-size:.78rem; color:var(--ink);
  font-variant-numeric:tabular-nums; }
.pool .meas .m{ color:var(--muted); } .pool .meas .m b{ color:var(--ink); font-weight:600; }
.pool .meas.none{ color:var(--muted); font-style:italic; }
.pool .btm{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
.pool .right{ display:flex; align-items:center; gap:8px; flex:none; }
.pool .cad{ font-size:.7rem; color:var(--muted); font-variant-numeric:tabular-nums; white-space:nowrap; }
.legend{ display:flex; flex-wrap:wrap; gap:10px 14px; margin:0 0 var(--s2); padding:0 2px;
  font-size:.68rem; color:var(--muted); }
.legend span{ display:inline-flex; align-items:center; gap:5px; }
.legend .sw{ display:inline-block; }
.legend .sw.band{ width:14px; height:9px; background:var(--ok-bg); border:1px solid var(--line); border-radius:2px; }
.legend .sw.dot{ width:8px; height:8px; border-radius:50%; }
.legend .sw.dot.treated{ background:var(--treated); }
.legend .sw.tick{ width:0; height:12px; border-left:1px dashed var(--na); }

/* collapsible residence zones — remembered open/closed like scroll position */
.zone{ margin-bottom:var(--s2); }
.zone-head{ width:100%; display:flex; align-items:center; gap:10px; text-align:left;
  background:var(--card); border:1px solid var(--line); border-radius:12px;
  padding:11px var(--s2); cursor:pointer; color:var(--ink); font:inherit; }
.zone-head .zh-name{ font-weight:700; color:var(--title); font-size:1rem; letter-spacing:.02em; }
.zone-head .zh-meta{ font-size:.72rem; color:var(--muted); margin-left:auto; }
.zone-head .zh-caret{ font-size:.8rem; color:var(--muted); transition:transform .15s; width:14px; text-align:center; }
.zone.closed .zh-caret{ transform:rotate(-90deg); }
.zone-body{ margin-top:6px; }
.zone.closed .zone-body{ display:none; }
.zh-dot{ width:8px; height:8px; border-radius:50%; display:inline-block; margin-left:2px; }
.dot{ width:8px; height:8px; border-radius:50%; display:inline-block; }
.dot.ok{ background:var(--ok); } .dot.low{ background:var(--low); }
.dot.high{ background:var(--high); } .dot.na{ background:var(--na); }
.note{ font-size:.74rem; color:var(--muted); margin:var(--s1) 0 0; }
.foot{ margin-top:var(--s5); padding-top:var(--s3); border-top:1px solid var(--line);
  font-size:.72rem; color:var(--muted); }
.foot code{ background:var(--na-bg); padding:1px 5px; border-radius:4px; }
</style>

<div class="wrap">
  <header class="top">
    <h1>Piscines<span class="beta">Beta</span></h1>
    <p class="sub" id="range">—</p>
    <div class="tools">
      <label for="file">↥ Charger une sauvegarde</label>
      <input type="file" id="file" accept=".json,application/json">
      <button id="theme" type="button">◐ Thème</button>
    </div>
  </header>

  <section class="eyebrow"><h2>Piscines</h2><span class="hint" id="pools-hint"></span></section>
  <div class="legend">
    <span><i class="sw band"></i>zone stable Cl 1–3</span>
    <span><i class="sw dot ok"></i>ok</span>
    <span><i class="sw dot low"></i>à vérifier</span>
    <span><i class="sw dot high"></i>critique</span>
    <span><i class="sw dot treated"></i>traité</span>
    <span><i class="sw tick"></i>produit</span>
  </div>
  <div id="pools"></div>

  <section class="eyebrow"><h2>Rythme de passage</h2><span class="hint" id="rhythm-hint"></span></section>
  <div class="tiles" id="tiles"></div>
  <div class="bars" id="bars"></div>
  <div class="axis" id="axis"></div>

  <section class="eyebrow"><h2>Produits ajoutés</h2><span class="hint" id="prod-hint"></span></section>
  <div class="prod" id="prod"></div>

  <div class="foot" id="foot"></div>
</div>

<script>
/* ================= LP.metrics — PORTABLE. These pure functions lift verbatim
   into the live app (store.js / app.js). A "passage" = one pool on one calendar
   day, however many products/readings were logged in that stop. Counting event
   rows (visits[].length) double-counts; counting distinct (poolId, day) does not. */
const LP = (() => {
  const day = (iso) => (iso || '').slice(0, 10);
  const uniq = (a) => Array.from(new Set(a));

  // distinct passages: [{poolId, day}]
  function passages(visits) {
    const seen = new Set(); const out = [];
    for (const v of visits) {
      const k = v.poolId + '|' + day(v.at);
      if (v.poolId && day(v.at) && !seen.has(k)) { seen.add(k); out.push({ poolId: v.poolId, day: day(v.at) }); }
    }
    return out;
  }
  // {day: passageCount}
  function passagesByDay(visits) {
    const m = {};
    for (const p of passages(visits)) m[p.day] = (m[p.day] || 0) + 1;
    return m;
  }
  // minutes/pool for one day: span between first & last passage start / (n-1).
  // Only meaningful with enough stops — returns null under `minStops`.
  function minPerPool(visits, d, minStops = 4) {
    const starts = {};
    for (const v of visits) {
      if (day(v.at) !== d) continue;
      const t = new Date(v.at).getTime();
      if (starts[v.poolId] == null || t < starts[v.poolId]) starts[v.poolId] = t;
    }
    const ts = Object.values(starts).sort((a, b) => a - b);
    if (ts.length < minStops) return null;
    const span = (ts[ts.length - 1] - ts[0]) / 60000;
    return span / (ts.length - 1);
  }
  const median = (a) => { if (!a.length) return null; const s = [...a].sort((x, y) => x - y); const m = s.length >> 1; return s.length % 2 ? s[m] : (s[m - 1] + s[m]) / 2; };

  // product totals across treatment visits: {productId: qty}
  function productTotals(visits) {
    const m = {};
    for (const v of visits) if (v.productId && v.qty != null) m[v.productId] = (m[v.productId] || 0) + Number(v.qty);
    return m;
  }
  // per-pool passage counts, desc
  function poolPassages(visits) {
    const m = {};
    for (const p of passages(visits)) m[p.poolId] = (m[p.poolId] || 0) + 1;
    return m;
  }
  // FC series for a pool, chronological [{at, fc}]
  function fcSeries(readings, poolId) {
    return readings.filter((r) => r.poolId === poolId && r.chlorine != null)
      .sort((a, b) => a.at.localeCompare(b.at)).map((r) => ({ at: r.at, fc: r.chlorine }));
  }
  // Last visit of ANY category (service-mark, treatment, backwash) — a stable
  // pool marked "entretenue" with no measure still counts. This is the fix the
  // live app needs: its revisit logic currently leans on a measure existing.
  function lastVisit(visits, poolId) {
    let best = null;
    for (const v of visits) if (v.poolId === poolId && (!best || v.at > best.at)) best = v;
    return best;
  }
  // Latest reading (a measure) for a pool, or null.
  function lastReading(readings, poolId) {
    let best = null;
    for (const r of readings) if (r.poolId === poolId && (!best || r.at > best.at)) best = r;
    return best;
  }
  // Treatment events for a pool (a product went in) — the "traité" markers.
  function treatments(visits, poolId) {
    return visits.filter((v) => v.poolId === poolId && v.productId)
      .map((v) => ({ at: v.at, productId: v.productId })).sort((a, b) => a.at.localeCompare(b.at));
  }
  // Per-pool visit cadence: passages / weeks in the data window (>=1 week).
  function visitsPerWeek(visits, poolId, spanDays) {
    const n = passages(visits).filter((p) => p.poolId === poolId).length;
    return n / Math.max(1, spanDays / 7);
  }
  // Rolling window helpers keyed off a reference day.
  function windowPassages(visits, refISO, days) {
    const refT = new Date(refISO + 'T00:00:00').getTime();
    const by = passagesByDay(visits); let sum = 0, worked = 0;
    for (const [d, n] of Object.entries(by)) {
      const age = (refT - new Date(d + 'T00:00:00').getTime()) / 864e5;
      if (age >= 0 && age < days) { sum += n; worked++; }
    }
    return { sum, worked };
  }
  return { day, uniq, passages, passagesByDay, minPerPool, median, productTotals,
    poolPassages, fcSeries, lastVisit, lastReading, windowPassages, treatments, visitsPerWeek };
})();

/* ================= view (beta-only; the live app renders these its own way) */
const PRODUCTS = {
  'hth-stick': { name: 'Stick', unit: 'stick' }, 'hth-galet': { name: 'Galet', unit: 'galet' },
  'hypomen-pro': { name: 'Cal-hypo (choc)', unit: 'g' }, 'hth-phminus': { name: 'pH−', unit: 'g' },
  'mareva-phplus': { name: 'pH+', unit: 'g' }, 'mareva-cya': { name: 'Stabilisant', unit: 'g' },
  'hth-borkler': { name: 'Borkler (algues)', unit: 'dose' }, 'acti-yellow': { name: 'Yellow (algues)', unit: 'dose' },
  'acti-floc': { name: 'Floculant', unit: 'sachet' },
};
const CL = { min: 1, max: 3 }; // FC band for the status dot
const fmtDay = (d) => { const p = (d || '').slice(0, 10).split('-'); return p[2] + '/' + p[1]; };
const fmtDMY = (d) => { const p = (d || '').slice(0, 10).split('-'); return p[0] ? p[2] + '/' + p[1] + '/' + p[0].slice(2) : '—'; };
const clState = (fc) => fc == null ? 'na' : fc < CL.min ? 'low' : fc > CL.max ? 'high' : 'ok';

let DATA = null;

// remembered collapsed zones — persisted like the app remembers scroll position
const ZKEY = 'lp.beta.zones.closed';
function closedZones() { try { return new Set(JSON.parse(localStorage.getItem(ZKEY) || '[]')); } catch (_) { return new Set(); } }
function toggleZone(z) { const s = closedZones(); s.has(z) ? s.delete(z) : s.add(z); try { localStorage.setItem(ZKEY, JSON.stringify([...s])); } catch (_) {} }

function poolLabel(id) {
  const p = (DATA.pools || []).find((x) => x.id === id);
  return p ? { res: p.res, unit: p.unit, nonPool: p.nonPool } : { res: id, unit: '', nonPool: false };
}

function render() {
  const V = DATA.visits || [], R = DATA.readings || [];
  const allDays = LP.uniq(V.map((v) => LP.day(v.at)).filter(Boolean)).sort();
  const ref = allDays[allDays.length - 1] || '2026-07-21';
  document.getElementById('range').textContent =
    'du ' + fmtDay(allDays[0] || ref) + ' au ' + fmtDay(ref) + ' · instantané';

  const byDay = LP.passagesByDay(V);
  const totalPassages = Object.values(byDay).reduce((a, b) => a + b, 0);
  const refT = new Date(ref + 'T00:00:00').getTime();

  // rhythm = 7-day mean. Sundays (nobody works) and single-day-off shifts sit
  // as legit zeros in the graph; the mean is over days actually worked so it
  // reads as "when we're out, this many pools", not diluted by rest days.
  const w7 = LP.windowPassages(V, ref, 7);
  const wPrev = LP.windowPassages(V, LP.day(new Date(refT - 7 * 864e5).toISOString()), 7);
  const meanWorked = w7.worked ? w7.sum / w7.worked : 0;
  const trend = wPrev.sum ? Math.round(((w7.sum - wPrev.sum) / wPrev.sum) * 100) : null;

  document.getElementById('tiles').innerHTML = [
    tile(w7.sum, 'passages', '7 derniers jours', w7.worked + ' jours travaillés'),
    tile(meanWorked.toFixed(1), 'piscines/jour', 'moyenne', 'par jour travaillé'),
    tile(wPrev.sum, 'passages', 'semaine −1', trend == null ? 'réf.' : (trend >= 0 ? '▲ +' : '▼ ') + trend + '%'),
  ].join('');
  document.getElementById('rhythm-hint').textContent = totalPassages + ' passages en tout';

  // per-day graph — last 21 days, weekday letters, Sundays flagged
  const WD = ['D', 'L', 'M', 'M', 'J', 'V', 'S'];
  const days = [];
  for (let i = 20; i >= 0; i--) days.push(new Date(refT - i * 864e5).toISOString().slice(0, 10));
  const max = Math.max(1, ...days.map((d) => byDay[d] || 0));
  document.getElementById('bars').innerHTML = days.map((d) => {
    const n = byDay[d] || 0; const dow = new Date(d + 'T12:00:00').getDay();
    const cls = [n === 0 ? 'zero' : '', d === ref ? 'today' : '', dow === 0 ? 'sun' : ''].join(' ');
    return `<span class="bar ${cls}"><b>${n || ''}</b><i style="height:${n ? Math.max(Math.round(n / max * 100), 8) : 3}%"></i></span>`;
  }).join('');
  document.getElementById('axis').innerHTML = days.map((d, i) => {
    const dow = new Date(d + 'T12:00:00').getDay();
    return `<span class="${dow === 0 ? 'sun' : ''}">${WD[dow]}<em>${i % 3 === 0 ? fmtDay(d) : ''}</em></span>`;
  }).join('');

  // pools — actual pools only (no-bassin rentals: HO, EP 5P, EPP 11/12 excluded).
  // Augmented with last visit (any category) + last measure + weekly cadence.
  // Sorted longest-unseen first so what needs a look floats up.
  const spanDays = Math.max(1, (refT - new Date((allDays[0] || ref) + 'T00:00:00').getTime()) / 864e5);
  const range = [new Date((allDays[0] || ref) + 'T00:00:00').getTime(), refT + 864e5];
  const poolRow = (p) => {
    const lv = LP.lastVisit(V, p.id), lr = LP.lastReading(R, p.id);
    const s = LP.fcSeries(R, p.id), tr = LP.treatments(V, p.id);
    const ageD = lv ? Math.round((refT - new Date(LP.day(lv.at) + 'T00:00:00').getTime()) / 864e5) : null;
    const seen = lv ? 'vu ' + fmtDay(lv.at) : 'jamais vu';
    const warn = (ageD == null || ageD > 7);
    const vpw = LP.visitsPerWeek(V, p.id, spanDays);
    const cadence = `<span class="cad">${vpw >= 0.1 ? vpw.toFixed(1) + '/sem' : '—'}</span>`;
    let meas;
    if (lr) meas = `<div class="meas"><span class="dot ${clState(lr.chlorine)}"></span>` +
      `<span class="m">Cl <b>${lr.chlorine != null ? lr.chlorine : '—'}</b></span>` +
      `<span class="m">pH <b>${lr.ph != null ? lr.ph : '—'}</b></span>` +
      `<span class="m">CyA <b>${lr.stabilizer != null ? lr.stabilizer : '—'}</b></span></div>`;
    else meas = '<div class="meas none">aucune mesure</div>';
    return `<div class="pool${warn ? ' stale' : ''}">
      <div class="head"><span class="id">${p.res} ${p.unit}</span>
        <span class="seen${warn ? ' warn' : ''}">${seen}</span></div>
      <div class="btm">${meas}<div class="right">${cadence}${spark(s, tr, range)}</div></div></div>`;
  };
  const isStale = (p) => { const lv = LP.lastVisit(V, p.id); return !lv || (refT - new Date(LP.day(lv.at) + 'T00:00:00').getTime()) / 864e5 > 7; };
  // group into residence zones, keeping seed order; sort within by longest-unseen
  const realPools = (DATA.pools || []).filter((p) => !p.nonPool);
  const zoneOrder = LP.uniq(realPools.map((p) => p.res));
  const closed = closedZones();
  document.getElementById('pools').innerHTML = zoneOrder.map((z) => {
    const zp = realPools.filter((p) => p.res === z).sort((a, b) => {
      const la = LP.lastVisit(V, a.id), lb = LP.lastVisit(V, b.id);
      return (la ? la.at : '').localeCompare(lb ? lb.at : '');
    });
    const due = zp.filter(isStale).length;
    const isClosed = closed.has(z);
    const meta = zp.length + ' piscines' + (due ? ` · <span style="color:var(--low)">${due} à voir</span>` : '');
    return `<div class="zone${isClosed ? ' closed' : ''}" data-zone="${z}">
      <button class="zone-head" type="button" data-zone="${z}">
        <span class="zh-name">${z}</span><span class="zh-meta">${meta}</span><span class="zh-caret">▾</span>
      </button>
      <div class="zone-body">${zp.map(poolRow).join('')}</div></div>`;
  }).join('');
  document.querySelectorAll('.zone-head').forEach((h) => h.addEventListener('click', () => {
    const z = h.dataset.zone; toggleZone(z);
    h.closest('.zone').classList.toggle('closed');
  }));
  document.getElementById('pools-hint').textContent =
    realPools.length + ' piscines · ' + fmtDay(allDays[0]) + '→' + fmtDay(ref);

  // products — reorder signal, at the foot of the page. Each total is annotated
  // with the date counting began for that product ("depuis jj/mm/aa").
  const totals = LP.productTotals(V);
  const rows = Object.entries(totals).sort((a, b) => b[1] - a[1]);
  const pmax = Math.max(1, ...rows.map(([, q]) => q));
  const firstOf = (id) => { let m = null; for (const v of V) if (v.productId === id && (!m || v.at < m)) m = v.at; return m; };
  document.getElementById('prod').innerHTML = rows.map(([id, q]) => {
    const p = PRODUCTS[id] || { name: id, unit: '' };
    return `<div class="prow"><div><div class="pn">${p.name}</div><div class="pk">depuis ${fmtDMY(firstOf(id))}</div></div>
      <div class="pq">${round(q)} <small>${p.unit}</small></div>
      <div class="track"><i style="width:${Math.round((q / pmax) * 100)}%"></i></div></div>`;
  }).join('');
  document.getElementById('prod-hint').textContent = rows.length + ' produits · depuis ' + fmtDMY(allDays[0]);

  document.getElementById('foot').innerHTML =
    'Beta lecture seule — données figées d’un export (aucun nom locataire). ' +
    'La logique <code>LP.metrics</code> se transpose telle quelle dans l’app. ' +
    'Chargez une sauvegarde récente pour voir vos chiffres du jour.';
}

function tile(n, u, l, k) {
  return `<div class="tile"><div class="n">${n}</div><div class="u">${u}</div>
    <div class="l">${l}</div><div class="k">${k}</div></div>`;
}
const round = (q) => Math.round(q * 10) / 10;

// FC sparkline on a SHARED time axis so every pool's line length is comparable
// (a recent-only pool hugs the right; a season-long one spans full width).
// Shows the stable band, point colours (stable/à vérifier/critique) and small
// "traité" ticks where a product went in — cause and effect on one line.
function spark(series, treatments, range) {
  const w = 118, h = 30, pad = 3;
  const t0 = range[0], t1 = range[1];
  const X = (at) => pad + ((new Date(at).getTime() - t0) / (t1 - t0)) * (w - 2 * pad);
  const maxFc = Math.max(3.5, ...series.map((p) => p.fc));
  const y = (fc) => h - pad - (fc / maxFc) * (h - 2 * pad);
  const band = `<rect x="0" y="${y(CL.max).toFixed(1)}" width="${w}" height="${Math.max(0, y(CL.min) - y(CL.max)).toFixed(1)}" fill="var(--ok-bg)"/>`;
  const ticks = (treatments || []).map((tt) =>
    `<line x1="${X(tt.at).toFixed(1)}" y1="0" x2="${X(tt.at).toFixed(1)}" y2="${h}" stroke="var(--na)" stroke-width="1" stroke-dasharray="1.5 1.5" opacity=".55"/>`).join('');
  if (!series.length) return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${band}${ticks}</svg>`;
  const treatDays = new Set((treatments || []).map((tt) => (tt.at || '').slice(0, 10)));
  const pts = series.map((p) => `${X(p.at).toFixed(1)},${y(p.fc).toFixed(1)}`).join(' ');
  const dots = series.map((p, i) => {
    const st = clState(p.fc); const c = st === 'ok' ? 'var(--ok)' : st === 'low' ? 'var(--low)' : 'var(--high)';
    const cx = X(p.at), cy = y(p.fc);
    // chem-state dot; plus a small blue cap above it when that day was also treated
    const treated = treatDays.has((p.at || '').slice(0, 10))
      ? `<circle cx="${cx.toFixed(1)}" cy="${Math.max(2, cy - 5).toFixed(1)}" r="1.7" fill="var(--treated)"/>` : '';
    return `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="${i === series.length - 1 ? 3 : 1.8}" fill="${c}"/>${treated}`;
  }).join('');
  const line = series.length > 1 ? `<polyline points="${pts}" fill="none" stroke="var(--brand)" stroke-width="1.5"/>` : '';
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${band}${ticks}${line}${dots}</svg>`;
}

// theme toggle
document.getElementById('theme').addEventListener('click', () => {
  const r = document.documentElement;
  const cur = r.getAttribute('data-theme');
  const dark = cur ? cur === 'dark' : matchMedia('(prefers-color-scheme:dark)').matches;
  r.setAttribute('data-theme', dark ? 'light' : 'dark');
});

// load a fresh backup (visits/readings/pools only; names never read)
document.getElementById('file').addEventListener('change', (e) => {
  const f = e.target.files[0]; if (!f) return;
  const rd = new FileReader();
  rd.onload = () => {
    try {
      const j = JSON.parse(rd.result);
      DATA = {
        pools: (j.pools || []).map((p) => ({ id: p.id, res: p.res, unit: p.unit, nonPool: p.nonPool })),
        visits: (j.visits || []).map((v) => ({ poolId: v.poolId, type: v.type, productId: v.productId, qty: v.qty, at: v.at })),
        readings: (j.readings || []).filter((r) => r.deleted !== true).map((r) => ({ poolId: r.poolId, ph: r.ph, chlorine: r.chlorine, stabilizer: r.stabilizer, at: r.at })),
      };
      render();
    } catch (_) { alert('Fichier illisible — choisissez un export de sauvegarde .json'); }
  };
  rd.readAsText(f);
});

// boot
try { DATA = JSON.parse(document.getElementById('lp-data').textContent); render(); }
catch (err) { document.getElementById('range').textContent = 'données non chargées'; }
</script>
